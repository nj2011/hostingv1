<!DOCTYPE html>
<html lang="en">
<head>
    <title>NEXUS BotHost</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="dark">
    <style>
        /* =========================================================
           NEXUS BOTHOST — DESIGN SYSTEM
           A mission-control console for running and supervising bots.
           Signature: HUD corner-bracket framing + radar status pulses,
           built on the terminal/monospace identity the app already
           speaks (JetBrains Mono for data, IBM Plex Sans for UI copy).
           ========================================================= */

        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            /* surfaces */
            --bg:        #0a0c0e;
            --surface:   #111417;
            --panel:     #15181c;
            --panel-2:   #1a1e23;
            --border:    #262b30;
            --border-hi: #3a4147;

            /* text */
            --text:      #dcdfd9;
            --text-dim:  #9aa39c;
            --muted:     #6b7570;

            /* signal colors */
            --accent:    #ffb454; /* amber — brand / primary action */
            --accent2:   #5eead4; /* teal — live / secondary signal */
            --green:     #7ee787; /* running / success */
            --red:       #ff6b6b; /* stopped / error */
            --yellow:    #ffb454;
            --purple:    #c8a8ff; /* admin / privileged */

            /* on-color text (for filled buttons) */
            --on-accent: #241705;
            --on-accent2:#062420;
            --on-green:  #08240d;
            --on-red:    #2a0808;
            --on-purple: #180f2c;

            --radius:    4px;
            --radius-lg: 8px;
            --font-ui:   'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;

            --shadow-lg: 0 20px 60px -12px rgba(0,0,0,.65);
            --shadow-sm: 0 2px 10px rgba(0,0,0,.35);
            --ease: cubic-bezier(.2,.7,.2,1);
        }

        html { color-scheme: dark; }

        body {
            font-family: var(--font-ui);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        /* ambient console texture: faint grid + vignette, quiet by design */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image:
                linear-gradient(rgba(255,180,84,.028) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,180,84,.028) 1px, transparent 1px);
            background-size: 42px 42px;
            -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, #000 0%, transparent 72%);
            mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, #000 0%, transparent 72%);
        }

        #app {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* centers a lone .panel (login/register) both axes without
           disturbing normal document-flow views (nav + container) */
        #app > .panel { margin: auto; }

        ::selection { background: rgba(255,180,84,.28); color: var(--text); }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--surface); }
        ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 6px; border: 2px solid var(--surface); }
        ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

        a { color: var(--accent2); text-decoration: none; }
        a:hover { text-decoration: underline; }

        h1, h2, h3 { font-family: var(--font-ui); font-weight: 600; letter-spacing: -.01em; color: var(--text); }

        code, kbd { font-family: var(--font-mono); }

        :focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
            border-radius: 2px;
        }

        svg { display: block; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
        }

        /* ── layout shells ─────────────────────────────────────── */
        .container {
            width: 100%;
            max-width: 1240px;
            margin: 0 auto;
            padding: 32px 28px 64px;
        }

        /* ── buttons ───────────────────────────────────────────── */
        button { font-family: inherit; cursor: pointer; }

        .btn, .create-bot-btn, .submit-btn, .add-bot-btn,
        button:not([class]) {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .01em;
            color: var(--text);
            background: var(--panel-2);
            border: 1px solid var(--border-hi);
            border-radius: var(--radius);
            padding: 8px 13px;
            transition: border-color .15s var(--ease), background .15s var(--ease), transform .1s var(--ease), color .15s var(--ease);
        }
        .btn:hover, .create-bot-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
        .btn:active, .create-bot-btn:active { transform: translateY(0); }

        .btn-sm { font-size: 11px; padding: 5px 9px; border-radius: var(--radius); border: 1px solid var(--border-hi); background: var(--panel-2); color: var(--text-dim); }
        .btn-sm:hover { color: var(--accent); border-color: var(--accent); }

        .btn-start  { border-color: rgba(126,231,135,.35); color: var(--green); }
        .btn-start:hover  { background: rgba(126,231,135,.1); border-color: var(--green); }
        .btn-stop, .btn-delete { border-color: rgba(255,107,107,.3); color: var(--red); }
        .btn-stop:hover, .btn-delete:hover { background: rgba(255,107,107,.1); border-color: var(--red); }
        .btn-restart { border-color: rgba(200,168,255,.35); color: var(--purple); }
        .btn-restart:hover { background: rgba(200,168,255,.1); border-color: var(--purple); }
        .btn-console { border-color: rgba(94,234,212,.35); color: var(--accent2); }
        .btn-console:hover { background: rgba(94,234,212,.1); border-color: var(--accent2); }
        .btn-upload, .btn-sm-upload { color: var(--accent); border-color: rgba(255,180,84,.35); }
        .btn-copy, .btn-dl, .btn-refresh, .btn-clear, .btn-sm-new { color: var(--text-dim); }

        .add-bot-btn, .create-bot-btn {
            font-family: var(--font-ui);
            font-size: 13px;
            background: var(--accent);
            color: var(--on-accent);
            border-color: var(--accent);
            padding: 9px 16px;
        }
        .add-bot-btn:hover, .create-bot-btn:hover { background: #ffc478; color: var(--on-accent); border-color: #ffc478; }

        .btn-cancel {
            background: transparent; color: var(--muted); border: 1px solid var(--border);
        }
        .btn-cancel:hover { color: var(--text); border-color: var(--border-hi); }

        /* ── form controls ─────────────────────────────────────── */
        input[type="text"], input[type="password"], input[type="email"],
        input[type="file"]::file-selector-button,
        select, textarea {
            font-family: var(--font-ui);
            font-size: 13px;
            color: var(--text);
            background: var(--panel-2);
            border: 1px solid var(--border-hi);
            border-radius: var(--radius);
            padding: 9px 11px;
            width: 100%;
            transition: border-color .15s var(--ease), box-shadow .15s var(--ease);
        }
        input[type="text"]:focus, input[type="password"]:focus, input[type="email"]:focus,
        select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255,180,84,.14);
        }
        input::placeholder, textarea::placeholder { color: var(--muted); }

        .search-box, .filter-input, .filter-select, .status-filter {
            font-family: var(--font-mono);
            font-size: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 7px 10px;
            color: var(--text);
        }
        .search-box:focus, .filter-input:focus, .filter-select:focus, .status-filter:focus {
            outline: none; border-color: var(--accent2);
        }
        .search-box { min-width: 220px; }

        /* ── navigation (dashboard / admin / console) ─────────── */
        nav, .dashboard-nav, .admin-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 28px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 20;
            flex-wrap: wrap;
        }

        .nav-brand, .brand {
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 15px;
            letter-spacing: .02em;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-brand .tag, .nav-brand span, .brand .tag {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .09em;
            color: var(--on-accent);
            background: var(--accent);
            border-radius: 3px;
            padding: 2px 6px;
            text-transform: uppercase;
        }

        .nav-links { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .nav-links a {
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 500;
            color: var(--text-dim);
            padding: 7px 11px;
            border-radius: var(--radius);
            border: 1px solid transparent;
            transition: color .15s var(--ease), border-color .15s var(--ease), background .15s var(--ease);
        }
        .nav-links a:hover { color: var(--text); background: var(--panel-2); text-decoration: none; }
        .nav-links a.active { color: var(--accent); border-color: rgba(255,180,84,.3); background: rgba(255,180,84,.08); }

        .welcome {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--muted);
            padding: 0 4px;
            border-left: 1px solid var(--border);
            margin-left: 4px;
            padding-left: 12px;
        }

        .nav-user { display: flex; align-items: center; gap: 14px; font-size: 13px; color: var(--text-dim); }

        .logout-btn, .back-btn {
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 500;
            color: var(--text-dim);
            border: 1px solid var(--border-hi);
            border-radius: var(--radius);
            padding: 6px 11px;
            transition: color .15s var(--ease), border-color .15s var(--ease);
        }
        .logout-btn:hover, .back-btn:hover { color: var(--red); border-color: var(--red); text-decoration: none; }
        .back-btn:hover { color: var(--accent2); border-color: var(--accent2); }

        /* ── HUD corner brackets (signature element) ──────────── */
        .corner {
            position: absolute;
            width: 16px;
            height: 16px;
            border: 2px solid var(--accent);
            opacity: .55;
            pointer-events: none;
        }
        .corner-tl { top: -1px; left: -1px; border-right: none; border-bottom: none; border-top-left-radius: 4px; }
        .corner-tr { top: -1px; right: -1px; border-left: none; border-bottom: none; border-top-right-radius: 4px; }
        .corner-bl { bottom: -1px; left: -1px; border-right: none; border-top: none; border-bottom-left-radius: 4px; }
        .corner-br { bottom: -1px; right: -1px; border-left: none; border-top: none; border-bottom-right-radius: 4px; }

        /* ── login / register panel ────────────────────────────── */
        .panel {
            position: relative;
            width: 100%;
            max-width: 408px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 34px 32px 26px;
            box-shadow: var(--shadow-lg);
            margin: 40px 20px;
        }

        .brand-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }

        .status-pill {
            display: flex; align-items: center; gap: 6px;
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: .04em;
            color: var(--green);
            background: rgba(126,231,135,.08);
            border: 1px solid rgba(126,231,135,.3);
            border-radius: 20px;
            padding: 4px 9px 4px 7px;
            text-transform: uppercase;
        }
        .status-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 0 0 rgba(126,231,135,.6);
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%   { box-shadow: 0 0 0 0 rgba(126,231,135,.55); }
            70%  { box-shadow: 0 0 0 6px rgba(126,231,135,0); }
            100% { box-shadow: 0 0 0 0 rgba(126,231,135,0); }
        }

        .panel h1 { font-size: 21px; margin-bottom: 4px; }
        .panel .subtitle { font-size: 13px; color: var(--text-dim); margin-bottom: 24px; }

        .field { margin-bottom: 16px; }
        .field label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .04em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 6px;
        }
        .field-input-wrap { position: relative; display: flex; align-items: center; }
        .field-icon {
            position: absolute; left: 11px; display: flex; color: var(--muted); pointer-events: none;
        }
        .field-input-wrap input { padding-left: 34px; }
        .field-input-wrap input[name="password"] { padding-right: 38px; }
        .field-input-wrap:focus-within .field-icon { color: var(--accent); }

        .password-toggle {
            position: absolute; right: 8px;
            background: transparent; border: none; color: var(--muted);
            padding: 4px; border-radius: 3px; display: flex;
        }
        .password-toggle:hover { color: var(--text); }

        .error-message {
            display: none;
            font-size: 11px;
            color: var(--red);
            margin-top: 6px;
        }
        .field.has-error input { border-color: var(--red); }
        .field.has-error .error-message { display: block; }

        .caps-warning {
            display: none;
            font-size: 11px;
            color: var(--yellow);
            margin-top: 6px;
        }
        .caps-warning.visible { display: block; }

        .remember-row {
            display: flex; align-items: center; gap: 8px;
            font-size: 12px; color: var(--text-dim);
            margin-bottom: 20px; cursor: pointer;
        }
        .remember-row input { width: auto; accent-color: var(--accent); }

        .submit-btn {
            width: 100%;
            justify-content: center;
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 600;
            background: var(--accent);
            color: var(--on-accent);
            border-color: var(--accent);
            padding: 11px;
        }
        .submit-btn:hover { background: #ffc478; border-color: #ffc478; }
        .btn-arrow { transition: transform .15s var(--ease); }
        .submit-btn:hover .btn-arrow { transform: translateX(3px); }

        .links-row {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 12px; margin-top: 18px; color: var(--muted);
        }
        .sep { color: var(--border-hi); }

        .kbd-hint {
            display: flex; align-items: center; justify-content: center; gap: 5px;
            font-size: 11px; color: var(--muted); margin-top: 16px;
        }
        .kbd-hint kbd {
            font-size: 10px;
            background: var(--panel-2);
            border: 1px solid var(--border-hi);
            border-bottom-width: 2px;
            border-radius: 3px;
            padding: 1px 5px;
            color: var(--text-dim);
        }

        .footnote {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            font-size: 10px; color: var(--muted);
            margin-top: 20px; padding-top: 16px;
            border-top: 1px solid var(--border);
            font-family: var(--font-mono);
            letter-spacing: .02em;
        }
        .dot-sep { color: var(--border-hi); }
        #clock { font-variant-numeric: tabular-nums; }

        /* ── dashboard: header + bot cards ─────────────────────── */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .header h1 { font-size: 22px; }

        .bots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 64px 20px;
            border: 1px dashed var(--border-hi);
            border-radius: var(--radius-lg);
            color: var(--text-dim);
        }
        .empty-state p { margin: 4px 0; font-size: 13px; }
        .empty-state p:first-child { color: var(--text); font-size: 14px; font-weight: 500; }

        .bot-card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 18px;
            transition: border-color .15s var(--ease), transform .15s var(--ease);
        }
        .bot-card:hover { border-color: var(--border-hi); transform: translateY(-2px); }

        .bot-name {
            font-size: 15px; font-weight: 600; color: var(--text);
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
            margin-bottom: 4px;
        }
        .bot-id {
            font-family: var(--font-mono); font-size: 11px; color: var(--muted);
            margin-bottom: 10px;
        }

        .bot-status, .status-badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-family: var(--font-mono);
            font-size: 10px; font-weight: 700; letter-spacing: .06em;
            padding: 3px 8px; border-radius: 3px;
            width: fit-content;
        }
        .status-running   { color: var(--green);  background: rgba(126,231,135,.1); border: 1px solid rgba(126,231,135,.3); }
        .status-stopped    { color: var(--muted);  background: rgba(107,117,112,.1); border: 1px solid var(--border-hi); }
        .status-starting, .status-restarting  { color: var(--accent); background: rgba(255,180,84,.1); border: 1px solid rgba(255,180,84,.3); }
        .status-error, .status-crashed { color: var(--red); background: rgba(255,107,107,.1); border: 1px solid rgba(255,107,107,.3); }

        .status-badge::before {
            content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor;
        }

        .messages-count { font-size: 12px; color: var(--text-dim); margin: 10px 0 14px; }

        .deps-badge {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 10px; color: var(--accent);
            background: rgba(255,180,84,.1); border: 1px solid rgba(255,180,84,.3);
            border-radius: 3px; padding: 2px 7px;
        }
        .deps-indicator {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 11px; color: var(--accent);
        }

        .spinner {
            width: 10px; height: 10px; border-radius: 50%;
            border: 2px solid rgba(255,180,84,.25); border-top-color: var(--accent);
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .bot-actions { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
        .bot-actions .btn { flex: 1; justify-content: center; min-width: 84px; }
        .btn-upload { width: 100%; justify-content: center; }

        /* ── stats grid (admin dashboard) ──────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px;
            margin-bottom: 28px;
        }
        .stat-card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 18px;
            overflow: hidden;
        }
        .stat-card::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent 70%);
            opacity: .7;
        }
        .stat-icon { font-size: 18px; margin-bottom: 10px; opacity: .9; }
        .stat-number {
            font-family: var(--font-mono); font-size: 28px; font-weight: 700;
            color: var(--text); font-variant-numeric: tabular-nums; line-height: 1;
        }
        .stat-label { font-size: 12px; color: var(--text-dim); margin-top: 6px; }
        .stat-trend { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 11px; color: var(--muted); }
        .trend-up { color: var(--green); display: inline-flex; align-items: center; gap: 2px; font-weight: 600; }
        .trend-down { color: var(--red); display: inline-flex; align-items: center; gap: 2px; font-weight: 600; }

        /* ── generic sections ───────────────────────────────────── */
        .section { margin-bottom: 28px; }
        .section-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; }
        .section-title {
            font-family: var(--font-mono); font-size: 13px; font-weight: 700;
            letter-spacing: .03em; text-transform: uppercase; color: var(--text);
            display: flex; align-items: center; gap: 8px;
        }

        .admin-action-group { display: flex; gap: 10px; flex-wrap: wrap; }

        .filter-group, .filter-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .stats-info { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }
        .clear-btn, .export-btn {
            font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
            background: var(--panel-2); border: 1px solid var(--border-hi);
            border-radius: var(--radius); padding: 7px 10px;
        }
        .clear-btn:hover { color: var(--text); }
        .export-btn:hover { color: var(--accent); border-color: var(--accent); }

        /* ── tables ─────────────────────────────────────────────── */
        .table-responsive { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius-lg); }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead th {
            text-align: left; font-family: var(--font-mono); font-size: 10px;
            letter-spacing: .06em; text-transform: uppercase; color: var(--text-dim);
            background: var(--surface); padding: 11px 14px; border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        tbody td { padding: 11px 14px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr { transition: background .1s var(--ease); }
        tbody tr:hover { background: var(--panel); }
        tbody td code { font-size: 11px; color: var(--text-dim); background: var(--panel-2); padding: 1px 5px; border-radius: 3px; }
        tbody td .btn { margin-right: 4px; }

        .badge {
            display: inline-flex; align-items: center;
            font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: .04em;
            padding: 3px 8px; border-radius: 3px;
        }
        .badge-running   { color: var(--green);  background: rgba(126,231,135,.1); border: 1px solid rgba(126,231,135,.3); }
        .badge-stopped    { color: var(--muted);  background: rgba(107,117,112,.12); border: 1px solid var(--border-hi); }
        .badge-starting, .badge-restarting { color: var(--accent); background: rgba(255,180,84,.1); border: 1px solid rgba(255,180,84,.3); }
        .badge-error, .badge-crashed { color: var(--red); background: rgba(255,107,107,.1); border: 1px solid rgba(255,107,107,.3); }
        .badge-admin { color: var(--purple); background: rgba(200,168,255,.1); border: 1px solid rgba(200,168,255,.3); }
        .badge-user  { color: var(--text-dim); background: var(--panel-2); border: 1px solid var(--border-hi); }
        .badge-you   { color: var(--accent2); background: rgba(94,234,212,.1); border: 1px solid rgba(94,234,212,.3); margin-left: 6px; }

        .bot-count-badge {
            font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
            background: var(--panel-2); border: 1px solid var(--border); border-radius: 20px; padding: 2px 9px;
        }

        /* ── modals ─────────────────────────────────────────────── */
        body div.modal {
            position: fixed; inset: 0;
            background: rgba(6,7,8,.78);
            backdrop-filter: blur(3px);
            display: none;
            align-items: center; justify-content: center;
            z-index: 1000;
            padding: 20px;
            animation: fade-in .15s var(--ease);
        }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

        body div.modal-content {
            position: relative;
            width: 100%; max-width: 460px;
            max-height: 90vh; overflow-y: auto;
            background: var(--surface);
            border: 1px solid var(--border-hi);
            border-radius: var(--radius-lg);
            padding: 26px 26px 22px;
            box-shadow: var(--shadow-lg);
            animation: modal-in .18s var(--ease);
        }
        @keyframes modal-in { from { opacity: 0; transform: translateY(8px) scale(.98); } to { opacity: 1; transform: none; } }

        .modal-content h2, .modal-content h3 { font-size: 16px; margin-bottom: 16px; }
        .modal-content form { display: flex; flex-direction: column; gap: 10px; }
        .modal-content input, .modal-content select { margin: 0; }
        .modal-content > input { margin-bottom: 10px; }
        .modal-content button[type="submit"], .modal-content form > button:first-of-type,
        .modal-content button:not(.btn-cancel):not([onclick*="close"]) {
            background: var(--accent); color: var(--on-accent); border-color: var(--accent);
            font-family: var(--font-ui); justify-content: center;
        }
        .modal-content button[type="submit"]:hover { background: #ffc478; }

        .file-info { font-size: 11px; color: var(--muted); margin: -2px 0 2px; }

        .health-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
        .health-item {
            display: flex; flex-direction: column; gap: 4px;
            background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 11px 12px; font-size: 11px;
        }
        .health-item strong { font-size: 11px; color: var(--text-dim); font-weight: 600; }
        .health-item span { font-family: var(--font-mono); font-size: 15px; color: var(--text); }

        .upload-area {
            border: 1.5px dashed var(--border-hi);
            border-radius: var(--radius-lg);
            padding: 22px 16px;
            text-align: center;
            transition: border-color .15s var(--ease), background .15s var(--ease);
        }
        .upload-area.drag-over { border-color: var(--accent); background: rgba(255,180,84,.05); }
        .upload-input { display: none; }
        .upload-label {
            display: inline-flex; align-items: center; gap: 6px;
            font-family: var(--font-mono); font-size: 12px; font-weight: 600;
            background: var(--panel-2); border: 1px solid var(--border-hi); color: var(--text);
            border-radius: var(--radius); padding: 8px 14px; cursor: pointer;
        }
        .upload-label:hover { border-color: var(--accent); color: var(--accent); }
        .auto-restart-toggle {
            display: flex; align-items: center; gap: 8px; justify-content: center;
            font-size: 11px; color: var(--text-dim); margin-top: 14px;
        }
        .auto-restart-toggle input { width: auto; accent-color: var(--accent); }

        .upload-progress { margin-top: 14px; }
        .progress-bar { height: 5px; background: var(--panel-2); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); transition: width .2s var(--ease); }

        .upload-list { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; text-align: left; }
        .upload-item {
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
            font-size: 11px; background: var(--panel-2); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 7px 9px;
        }
        .upload-item-name { display: flex; align-items: center; gap: 6px; overflow: hidden; }
        .upload-item-status { font-family: var(--font-mono); font-size: 10px; font-weight: 600; white-space: nowrap; }
        .status-uploading { color: var(--accent2); }
        .status-success, .status-restarted { color: var(--green); }
        .status-error { color: var(--red); }

        /* ── toast ──────────────────────────────────────────────── */
        body div.toast {
            position: fixed; bottom: 22px; right: 22px;
            background: var(--surface);
            color: var(--text);
            padding: 12px 18px;
            border-radius: var(--radius);
            border: 1px solid var(--border-hi);
            border-left: 3px solid var(--green);
            box-shadow: var(--shadow-lg);
            font-family: var(--font-mono);
            font-size: 12.5px;
            z-index: 1001;
            animation: toast-in .25s var(--ease);
            max-width: 380px;
            transition: opacity .3s var(--ease);
        }
        @keyframes toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

        /* ── error / 404 page ───────────────────────────────────── */
        body div.error-page {
            text-align: center;
            padding: 100px 20px;
            max-width: 420px;
            margin: 0 auto;
        }
        body .error-page h1 { font-family: var(--font-mono); font-size: 52px; color: var(--accent); letter-spacing: -.02em; }
        body .error-page p { color: var(--text-dim); margin: 10px 0 20px; font-size: 14px; }
        body .error-page a { color: var(--accent2); font-family: var(--font-mono); font-size: 13px; }

        /* ── bot console page ───────────────────────────────────── */
        .bot-info { padding: 22px 28px 0; max-width: 1240px; margin: 0 auto; width: 100%; }
        .bot-header { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
        .bot-header .bot-name { font-size: 16px; margin: 0; }
        .bot-meta { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-bottom: 12px; }

        .bot-stats {
            display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
            font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
            margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
        }
        .bot-stats span { display: flex; align-items: center; gap: 6px; }

        .signal-bars { display: inline-flex; align-items: flex-end; gap: 2px; height: 10px; }
        .signal-bars span { width: 3px; background: var(--green); border-radius: 1px; animation: signal 1s ease-in-out infinite; }
        .signal-bars span:nth-child(1) { height: 4px; animation-delay: 0s; }
        .signal-bars span:nth-child(2) { height: 7px; animation-delay: .15s; }
        .signal-bars span:nth-child(3) { height: 10px; animation-delay: .3s; }
        @keyframes signal { 0%, 100% { opacity: .4; } 50% { opacity: 1; } }

        .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }

        .split-layout {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 16px;
            padding: 0 28px 32px;
            max-width: 1240px;
            margin: 0 auto;
            align-items: start;
        }

        .file-panel, .console-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            display: flex; align-items: center; justify-content: space-between;
            font-family: var(--font-mono); font-size: 12px; font-weight: 700;
            letter-spacing: .03em; text-transform: uppercase; color: var(--text);
            padding: 12px 14px; border-bottom: 1px solid var(--border);
        }
        .panel-actions { display: flex; gap: 6px; }

        .file-panel .search-box { margin: 10px 12px 0; width: calc(100% - 24px); }
        .breadcrumb {
            font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
            padding: 10px 12px 4px; display: flex; gap: 4px; flex-wrap: wrap;
        }
        .breadcrumb a { color: var(--accent2); cursor: pointer; }

        .file-browser { max-height: 320px; overflow-y: auto; padding: 6px; }
        .info-text { font-size: 12px; color: var(--muted); padding: 14px 10px; text-align: center; }

        .file-item {
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
            padding: 7px 8px; border-radius: var(--radius);
            font-size: 12.5px; cursor: default;
        }
        .file-item:hover { background: var(--panel-2); }
        .file-item .name { display: flex; align-items: center; gap: 8px; cursor: pointer; overflow: hidden; flex: 1; }
        .file-item .name span:last-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-item.folder .name { color: var(--text); font-weight: 500; }
        .file-item.folder-parent { color: var(--muted); }

        .file-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .12s var(--ease); }
        .file-item:hover .file-actions { opacity: 1; }
        .edit-btn, .delete-btn {
            font-family: var(--font-mono); font-size: 10px;
            background: var(--panel-2); border: 1px solid var(--border-hi); color: var(--text-dim);
            border-radius: 3px; padding: 3px 7px;
        }
        .edit-btn:hover { color: var(--accent2); border-color: var(--accent2); }
        .delete-btn:hover { color: var(--red); border-color: var(--red); }

        .editor-area {
            display: none;
            border-top: 1px solid var(--border);
            flex-direction: column;
        }
        .editor-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 9px 12px; background: var(--panel);
        }
        .editor-filename { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); }
        #editorContent {
            width: 100%; min-height: 240px; resize: vertical;
            font-family: var(--font-mono); font-size: 12.5px; line-height: 1.6;
            background: var(--bg); color: var(--text);
            border: none; border-radius: 0; padding: 12px;
        }
        #editorContent:focus { outline: none; box-shadow: inset 0 0 0 2px rgba(255,180,84,.2); }

        /* ── live console ───────────────────────────────────────── */
        .console-panel { min-height: 480px; position: relative; }
        .console-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 14px; border-bottom: 1px solid var(--border);
        }
        .console-toolbar { display: flex; align-items: center; gap: 12px; }
        .auto-scroll-badge {
            font-family: var(--font-mono); font-size: 10.5px; font-weight: 600;
            padding: 4px 9px; border-radius: 20px; cursor: pointer;
            border: 1px solid var(--border-hi); color: var(--text-dim);
        }
        .auto-scroll-on { color: var(--green); border-color: rgba(126,231,135,.35); background: rgba(126,231,135,.08); }
        .auto-scroll-off { color: var(--yellow); border-color: rgba(255,180,84,.35); background: rgba(255,180,84,.08); }

        .console-viewport {
            flex: 1;
            background: #08090b;
            overflow-y: auto;
            padding: 10px 4px;
            font-family: var(--font-mono);
            font-size: 12px;
            min-height: 400px;
            max-height: 560px;
            position: relative;
        }
        .console-spacer { position: absolute; top: 0; left: 0; width: 1px; }
        .console-line {
            padding: 2px 14px;
            white-space: pre-wrap;
            word-break: break-word;
            color: var(--text-dim);
            line-height: 1.65;
        }
        .console-line.cl-output { color: var(--text); }
        .console-line.cl-error { color: var(--red); }
        .console-line.cl-system { color: var(--accent2); }
        .console-line.cl-restart { color: var(--accent); }

        .jump-bottom-btn {
            display: none;
            position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
            font-family: var(--font-mono); font-size: 11px; font-weight: 600;
            background: var(--accent); color: var(--on-accent);
            border: none; border-radius: 20px; padding: 7px 14px;
            align-items: center; gap: 6px;
            box-shadow: var(--shadow-sm);
        }
        .jump-bottom-btn.visible { display: inline-flex; }
        .jump-bottom-btn .count {
            background: rgba(0,0,0,.2); border-radius: 10px; padding: 0 6px; font-size: 10px;
        }

        /* ── admin logs ─────────────────────────────────────────── */
        .logs-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            font-family: var(--font-mono);
            font-size: 12px;
            max-height: 560px;
            overflow-y: auto;
        }
        .log-line {
            padding: 8px 14px;
            border-bottom: 1px solid var(--border);
            color: var(--text-dim);
        }
        .log-line:last-child { border-bottom: none; }
        .log-line:hover { background: var(--panel); }
        .log-time { color: var(--muted); }
        .log-username { color: var(--accent2); font-weight: 600; }
        .log-action { color: var(--text); }
        .log-bot { color: var(--purple); }
        .log-level { font-size: 10px; font-weight: 700; letter-spacing: .04em; padding: 1px 6px; border-radius: 3px; margin: 0 2px; }
        .log-level-info { color: var(--accent2); background: rgba(94,234,212,.1); }
        .log-level-warning { color: var(--accent); background: rgba(255,180,84,.1); }
        .log-level-error { color: var(--red); background: rgba(255,107,107,.1); }

        /* ── settings ───────────────────────────────────────────── */
        .settings-list { list-style: none; margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
        .settings-list li { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-dim); }
        .settings-list .icon { color: var(--accent); font-family: var(--font-mono); }

        /* ── responsive ─────────────────────────────────────────── */
        @media (max-width: 900px) {
            .split-layout { grid-template-columns: 1fr; padding: 0 16px 28px; }
            .console-panel { min-height: 380px; }
            .bot-info { padding: 18px 16px 0; }
        }
        @media (max-width: 720px) {
            nav, .dashboard-nav, .admin-nav { padding: 12px 16px; }
            .container { padding: 22px 16px 48px; }
            .nav-links { gap: 2px; }
            .welcome { display: none; }
            .health-grid { grid-template-columns: 1fr; }
            .panel { padding: 26px 20px 20px; margin: 24px 14px; }
            body div.toast { left: 16px; right: 16px; max-width: none; }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="/app.js"></script>
</body>
</html>
